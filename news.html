<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News | DPSM</title>
    <!-- Favicon -->
    <link rel="icon" href="./images/dpsmlogo.png" type="image/png" />
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/fontawesome.css" />
<script src="/components/header/university-navbar.js" defer></script>
                            <script src="/components/header/division-navbar.js" defer></script>
                            <script src="/components/footer.js" defer></script>
  </head>
  <body>
    <!-- University Navbar Section -->
<university-navbar></university-navbar>
<!-- End of University Navbar -->
      <!-- Division Navbar Section -->
<division-navbar></division-navbar>
<!-- End of Division Navbar -->
        <div class="scroll-downs">
        </div>

        <!-- DPSM NEWS — dynamically loaded from API -->
        <div class="mt-5" id="announcements-section">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="course-organization-name d-flex flex-column align-items-start h-100 justify-content-start">
                            <p class="section-title lead display-6 fw-bold">DPSM Announcements</p>
                        </div>
                    </div>
                    <div class="container">
                        <!-- Featured article (most recent, full-width) -->
                        <div id="featured-article" class="row mb-5">
                            <!-- Loading skeleton -->
                            <div class="col-lg-6 placeholder-glow">
                                <div class="placeholder w-100 rounded" style="height:260px;"></div>
                            </div>
                            <div class="col-lg-6 placeholder-glow d-flex flex-column justify-content-center gap-2">
                                <div class="placeholder col-10" style="height:1.5rem;"></div>
                                <div class="placeholder col-6" style="height:1rem;"></div>
                                <div class="placeholder col-12" style="height:1rem;"></div>
                                <div class="placeholder col-12" style="height:1rem;"></div>
                            </div>
                        </div>
                        <!-- Remaining articles as cards -->
                        <div id="articles-grid" class="row"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- UPCOMING EVENTS — dynamically loaded from API -->
        <div class="px-4 pt-5 p-md-5 my-1 text-start" id="upcoming-events-section">
            <div class="container">
                <div class="row">
                    <div class="col-auto d-flex flex-column">
                        <div class="course-organization-name">
                            <p class="section-title lead display-6 fw-bold">Upcoming Events</p>
                        </div>
                    </div>
                </div>
                <div class="row mt-4" id="upcoming-events-list">
                    <div class="col-12 text-muted py-3">
                        <div class="spinner-border spinner-border-sm me-2"></div>Loading events...
                    </div>
                </div>
            </div>
        </div>

        <!-- PREVIOUS EVENTS — dynamically loaded from API -->
        <div class="px-4 pt-5 p-md-5 my-1 text-start" id="previous-events-section">
            <div class="container">
                <div class="row">
                    <div class="col-auto d-flex flex-column">
                        <div class="course-organization-name">
                            <p class="section-title lead display-6 fw-bold">Previous Events</p>
                        </div>
                    </div>
                </div>
                <div class="row mt-4" id="previous-events-list">
                    <div class="col-12 text-muted py-3">
                        <div class="spinner-border spinner-border-sm me-2"></div>Loading events...
                    </div>
                </div>
            </div>
        </div>

        <!-- STUDENT AWARDS — dynamically loaded from API -->
        <div class="px-4 pt-5 p-md-5 my-1 text-start" id="awards-section">
            <div class="container">
                <div class="row">
                    <div class="col-auto d-flex flex-column">
                        <div class="course-organization-name">
                            <p class="section-title lead display-6 fw-bold">Student Awards and Competitions</p>
                        </div>
                    </div>
                </div>
                <div class="row mt-3" id="awards-grid"></div>
            </div>
        </div>

    <!-- Footer -->
<dpsm-footer></dpsm-footer>
<!-- End of Footer -->
    <!-- Scroll to Top Button-->
    <button id="scrollTopBtn" title="Go to top">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="#ffa200" d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2V448c0 17.7 14.3 32 32 32s32-14.3 32-32V141.2L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"/></svg>
    </button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/navbar.js"></script>
    <script src="javascript/footer.js"></script>
    <script src="javascript/index.js"></script>
    <script src="javascript/typewriter.js"></script>
    <script src="javascript/api-config.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const logos = document.querySelectorAll('.sm-course-logo-container');
        logos.forEach((logo, index) => {
            logo.style.animationDelay = `${index * 1}s`;
        });

        const FALLBACK_IMG = './images/news-hero.png';
        const TODAY = new Date().toISOString().slice(0, 10); // 'YYYY-MM-DD' — string compare avoids timezone issues

        function fmtDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function escHtml(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function articleUrl(slug) {
            return `./article.html?slug=${encodeURIComponent(slug)}`;
        }

        // ── DPSM Announcements ────────────────────────────────────────────
        function renderFeatured(a) {
            const img = escHtml(a.image_url || FALLBACK_IMG);
            const url = escHtml(articleUrl(a.slug));
            document.getElementById('featured-article').innerHTML = `
                <div class="col-lg-6">
                    <a href="${url}" class="card-link border">
                        <img src="${img}" class="img-fluid rounded smaller-image" alt="${escHtml(a.title)}"
                            onerror="this.src='${FALLBACK_IMG}'">
                    </a>
                </div>
                <div class="col-lg-6">
                    <div class="h-100 d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="title-main">${escHtml(a.title)}</h5>
                            <p class="auth-date-main">${escHtml(a.author_name || 'DPSM')} | ${fmtDate(a.published_at || a.created_at)}</p>
                            <p class="desc-main">${escHtml(a.excerpt || '')}</p>
                        </div>
                        <a href="${url}">
                            <p class="section-subtitle text-warning footer-link fw-bold mb-4 display-7">Read More →</p>
                        </a>
                    </div>
                </div>`;
        }

        function renderAnnouncementCards(articles) {
            const grid = document.getElementById('articles-grid');
            if (!articles.length) { grid.innerHTML = ''; return; }
            grid.innerHTML = articles.map(a => {
                const img = escHtml(a.image_url || FALLBACK_IMG);
                const url = escHtml(articleUrl(a.slug));
                return `
                <div class="col-md-3 mb-4">
                    <a href="${url}" class="card-link">
                        <div class="main-news-card text-bg-dark">
                            <div class="image-container">
                                <img src="${img}" class="card-img" alt="${escHtml(a.title)}"
                                    onerror="this.src='${FALLBACK_IMG}'">
                                <div class="gradient-overlay"></div>
                            </div>
                            <div class="card-img-overlay card-overlay">
                                <p class="main-news-card-text">${escHtml(a.title)}</p>
                            </div>
                        </div>
                    </a>
                </div>`;
            }).join('');
        }

        fetch(`${API_BASE}/api/articles?category=announcement&page_size=9`)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                const items = data.items || [];
                if (!items.length) {
                    document.getElementById('featured-article').innerHTML = '';
                    document.getElementById('articles-grid').innerHTML = '';
                    return;
                }
                renderFeatured(items[0]);
                renderAnnouncementCards(items.slice(1));
            })
            .catch(() => {
                document.getElementById('featured-article').innerHTML = '';
                document.getElementById('articles-grid').innerHTML = '';
            });

        // ── Events (Upcoming & Previous) ──────────────────────────────────
        function renderEventCard(a) {
            const img = escHtml(a.image_url || FALLBACK_IMG);
            const url = escHtml(articleUrl(a.slug));
            const dateLabel = a.event_date
                ? new Date(a.event_date + 'T00:00:00').toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' })
                : '';
            return `
            <div class="col-12 mb-4">
                <div class="event-card card shadow-sm">
                    <div class="row g-0">
                        <div class="col-md-4 d-flex align-items-stretch">
                            <img src="${img}" class="img-fluid rounded-start w-100"
                                style="object-fit:cover; max-height:240px;"
                                alt="${escHtml(a.title)}"
                                onerror="this.src='${FALLBACK_IMG}'">
                        </div>
                        <div class="col-md-8">
                            <div class="card-body">
                                <h4 class="card-title">${escHtml(a.title)}</h4>
                                ${dateLabel ? `<p class="card-text mb-1" style="font-size:1.15rem;"><small class="text-muted">${dateLabel}</small></p><hr>` : ''}
                                <p class="card-text">${escHtml(a.excerpt || '')}</p>
                                <a href="${url}">
                                    <p class="section-subtitle text-warning footer-link fw-bold mb-4 display-7">Read More →</p>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        fetch(`${API_BASE}/api/articles?category=event&page_size=50`)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                const items = data.items || [];
                const upcoming = items.filter(a => !a.event_date || a.event_date >= TODAY);
                const previous = items.filter(a => a.event_date && a.event_date < TODAY);

                const upcomingEl = document.getElementById('upcoming-events-list');
                upcomingEl.innerHTML = upcoming.length
                    ? upcoming.map(renderEventCard).join('')
                    : '<div class="col-12 text-muted py-3">No upcoming events at this time.</div>';

                const previousEl = document.getElementById('previous-events-list');
                previousEl.innerHTML = previous.length
                    ? previous.map(renderEventCard).join('')
                    : '<div class="col-12 text-muted py-3">No previous events found.</div>';
            })
            .catch(() => {
                document.getElementById('upcoming-events-list').innerHTML = '';
                document.getElementById('previous-events-list').innerHTML = '';
                document.getElementById('upcoming-events-section').style.display = 'none';
                document.getElementById('previous-events-section').style.display = 'none';
            });

        // ── Student Awards & Competitions ─────────────────────────────────
        function renderAwardCard(a) {
            const img = escHtml(a.image_url || FALLBACK_IMG);
            const url = escHtml(articleUrl(a.slug));
            return `
            <div class="col-lg-4 mb-4 mt">
                <a href="${url}" class="card-link">
                    <div class="course-news-card text-bg-dark">
                        <div class="image-container">
                            <img src="${img}" class="card-img" alt="${escHtml(a.title)}"
                                onerror="this.src='${FALLBACK_IMG}'">
                            <div class="gradient-overlay"></div>
                        </div>
                        <div class="d-flex flex-column justify-content-center align-items-end card-img-overlay card-overlay">
                            <p class="course-news-card-text">${escHtml(a.title)}</p>
                            <p class="section-subtitle text-warning footer-link fw-bold mb-4 display-7">Read More →</p>
                        </div>
                    </div>
                </a>
            </div>`;
        }

        fetch(`${API_BASE}/api/articles?category=student_award&page_size=9`)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                const items = data.items || [];
                const grid = document.getElementById('awards-grid');
                grid.innerHTML = items.length
                    ? items.map(renderAwardCard).join('')
                    : '';
                if (!items.length) document.getElementById('awards-section').style.display = 'none';
            })
            .catch(() => {
                document.getElementById('awards-section').style.display = 'none';
            });
    });
    </script>
  </body>
</html>
