<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Article | DPSM</title>
    <!-- Favicon -->
    <link rel="icon" href="./images/dpsmlogo.png" type="image/png">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <script src="/components/header/university-navbar.js" defer></script>
    <script src="/components/header/division-navbar.js" defer></script>
    <script src="/components/footer.js" defer></script>
    <style>
      .article-content img { max-width: 100%; height: auto; border-radius: 6px; margin: 1rem 0; }
      .article-content p { margin-bottom: 1.25rem; }
      .article-content h2, .article-content h3 { margin-top: 2rem; margin-bottom: 1rem; }
      .article-not-found { min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .article-skeleton .ph { background: #e9ecef; border-radius: 4px; animation: ph-pulse 1.5s ease-in-out infinite; }
      @keyframes ph-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>
  </head>
  <body>
    <div class="wrapper">
    <!-- University Navbar Section -->
<university-navbar></university-navbar>
<!-- End of University Navbar -->
    <!-- Division Navbar Section -->
<division-navbar></division-navbar>
<!-- End of Division Navbar -->

    <!-- Hero Section -->
    <div id="article-hero" class="article-hero-section"
         style="position:relative; height:50vh; background-size:cover; background-position:center; background-color:#1a252f;">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);"></div>
    </div>
    <!-- End of Hero Section -->

    <!-- Article Section -->
    <div class="container-fluid p-5" id="article-body">

      <!-- Loading skeleton -->
      <div id="article-skeleton" class="article-skeleton px-4 pt-5 p-md-5">
        <div class="ph mb-3" style="height:2.5rem; width:70%;"></div>
        <div class="ph mb-4" style="height:1rem; width:30%;"></div>
        <div class="ph mb-2" style="height:1rem; width:100%;"></div>
        <div class="ph mb-2" style="height:1rem; width:95%;"></div>
        <div class="ph mb-2" style="height:1rem; width:90%;"></div>
        <div class="ph mb-2" style="height:1rem; width:80%;"></div>
      </div>

      <!-- Article content (hidden until loaded) -->
      <div id="article-content-wrap" style="display:none">
        <div class="row">
          <div class="px-4 pt-5 p-md-5 text-start">
            <div class="row article-title">
              <div class="col-lg-12">
                <div class="course-organization-name d-flex flex-column align-items-center h-100 justify-content-start">
                  <p class="section-title lead mb-3 display-4 fw-bold" id="article-title"></p>
                  <p class="section-subtitle mb-4 display-7" id="article-byline"></p>
                </div>
              </div>
            </div>
            <!-- Article body from Quill HTML -->
            <div class="row">
              <div class="col-lg-8 mx-auto">
                <div class="lead fw-normal text-start article-content" id="article-rich-content"></div>
              </div>
            </div>
            <!-- Footer meta -->
            <div class="row mt-5">
              <div class="container">
                <div class="row">
                  <div class="col-12">
                    <div class="pt-5 pb-5 shadow-sm">
                      <div class="container">
                        <div class="row">
                          <div class="col-12">
                            <div class="article-header" id="article-footer-meta"></div>
                            <div class="solid-line"></div>
                            <div class="references-container">
                              <div class="references" id="article-tags-row"></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Not found -->
      <div id="article-not-found" style="display:none" class="article-not-found text-center py-5">
        <p class="display-6 fw-bold text-muted">Article not found</p>
        <p class="text-muted mb-4">This article may have been moved or removed.</p>
        <a href="./news.html" class="btn btn-dark">← Back to News</a>
      </div>

    </div>
    <!-- End of Article Section -->

    <!-- Footer -->
<dpsm-footer></dpsm-footer>
<!-- End of Footer -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/navbar.js"></script>
    <script src="javascript/api-config.js"></script>
    <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug');

      if (!slug) {
        showNotFound();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/articles/${encodeURIComponent(slug)}`);
        if (!res.ok) { showNotFound(); return; }
        const a = await res.json();
        renderArticle(a);
      } catch {
        showNotFound();
      }

      function renderArticle(a) {
        // Update <title>
        document.title = `${a.title} | DPSM`;

        // Hero background
        if (a.image_url) {
          document.getElementById('article-hero').style.backgroundImage = `url('${escUrl(a.image_url)}')`;
        }

        // Title & byline
        document.getElementById('article-title').textContent = a.title || '';
        const date = a.published_at || a.created_at;
        const fmtDate = date ? new Date(date).toLocaleDateString('en-PH', { year:'numeric', month:'long', day:'numeric' }) : '';
        document.getElementById('article-byline').textContent =
          [a.author_name, fmtDate].filter(Boolean).join('  |  ');

        // Rich content (sanitised on server via nh3)
        document.getElementById('article-rich-content').innerHTML = a.content || '';

        // Footer meta
        document.getElementById('article-footer-meta').textContent =
          `${a.author_name || 'DPSM'}  |  ${fmtDate}`;

        // Tags
        if (a.tags && a.tags.length) {
          document.getElementById('article-tags-row').innerHTML =
            'Tags: ' + a.tags.map(t => `<span class="badge bg-secondary me-1">${escHtml(t)}</span>`).join('');
        }

        // Show content
        document.getElementById('article-skeleton').style.display = 'none';
        document.getElementById('article-content-wrap').style.display = '';
      }

      function showNotFound() {
        document.getElementById('article-skeleton').style.display = 'none';
        document.getElementById('article-not-found').style.display = '';
      }

      function escHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function escUrl(s) {
        return String(s||'').replace(/'/g,'%27');
      }
    })();
    </script>
  </body>
</html>
