<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Article | DPSM</title>
    <!-- Favicon -->
    <link rel="icon" href="./images/dpsmlogo.png" type="image/png">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <script src="/components/header/university-navbar.js" defer></script>
    <script src="/components/header/division-navbar.js" defer></script>
    <script src="/components/footer.js" defer></script>
    <style>
      .article-content img { max-width: 100%; height: auto; border-radius: 6px; margin: 1rem 0; }
      .article-content p { margin-bottom: 1.25rem; }
      .article-content h2, .article-content h3 { margin-top: 2rem; margin-bottom: 1rem; }
      .article-not-found { min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .article-skeleton .ph { background: #e9ecef; border-radius: 4px; animation: ph-pulse 1.5s ease-in-out infinite; }
      @keyframes ph-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

      /* ── Responsive image grid ───────────────────────────────────────── */
      .article-img-grid {
        display: grid;
        gap: 6px;
        margin: 1.25rem 0;
      }
      .article-img-grid > div {
        overflow: hidden;
        border-radius: 6px;
        aspect-ratio: 4 / 3;
        background: #e9ecef;
      }
      /* single image: natural size, no crop */
      .article-img-grid.single > div {
        aspect-ratio: unset;
      }
      .article-img-grid > div img {
        width: 100%; height: 100%;
        object-fit: cover;
        border-radius: 6px;
        margin: 0;
        display: block;
        cursor: zoom-in;
        transition: transform .2s ease;
      }
      .article-img-grid.single > div img {
        height: auto; object-fit: contain;
      }
      .article-img-grid > div img:hover { transform: scale(1.03); }

      /* column counts */
      .article-img-grid.cols-1 { grid-template-columns: 1fr; max-width: 640px; margin-left: auto; margin-right: auto; }
      .article-img-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
      .article-img-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
      @media (max-width: 576px) {
        .article-img-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
      }

      /* ── Lightbox ────────────────────────────────────────────────────── */
      #article-lightbox {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.88);
        z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        cursor: zoom-out;
        opacity: 0; transition: opacity .2s ease;
      }
      #article-lightbox.show { opacity: 1; }
      #article-lightbox img {
        max-width: 92vw; max-height: 92vh;
        border-radius: 8px;
        object-fit: contain;
        box-shadow: 0 8px 40px rgba(0,0,0,.6);
      }
      #article-lightbox-close {
        position: absolute; top: 1rem; right: 1.25rem;
        color: #fff; font-size: 2rem; line-height: 1;
        cursor: pointer; opacity: .8;
      }
      #article-lightbox-close:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrapper">
    <!-- University Navbar Section -->
<university-navbar></university-navbar>
<!-- End of University Navbar -->
    <!-- Division Navbar Section -->
<division-navbar></division-navbar>
<!-- End of Division Navbar -->

    <!-- Hero Section -->
    <div id="article-hero" class="article-hero-section"
         style="position:relative; height:50vh; background-size:cover; background-position:center; background-color:#1a252f;">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);"></div>
    </div>
    <!-- End of Hero Section -->

    <!-- Article Section -->
    <div class="container-fluid p-5" id="article-body">

      <!-- Loading skeleton -->
      <div id="article-skeleton" class="article-skeleton px-4 pt-5 p-md-5">
        <div class="ph mb-3" style="height:2.5rem; width:70%;"></div>
        <div class="ph mb-4" style="height:1rem; width:30%;"></div>
        <div class="ph mb-2" style="height:1rem; width:100%;"></div>
        <div class="ph mb-2" style="height:1rem; width:95%;"></div>
        <div class="ph mb-2" style="height:1rem; width:90%;"></div>
        <div class="ph mb-2" style="height:1rem; width:80%;"></div>
      </div>

      <!-- Article content (hidden until loaded) -->
      <div id="article-content-wrap" style="display:none">
        <div class="row">
          <div class="px-4 pt-5 p-md-5 text-start">
            <div class="row article-title">
              <div class="col-lg-12">
                <div class="course-organization-name d-flex flex-column align-items-center h-100 justify-content-start">
                  <p class="section-title lead mb-3 display-4 fw-bold" id="article-title"></p>
                  <p class="section-subtitle mb-4 display-7" id="article-byline"></p>
                </div>
              </div>
            </div>
            <!-- Article body from Quill HTML -->
            <div class="row">
              <div class="col-lg-8 mx-auto">
                <div class="lead fw-normal text-start article-content" id="article-rich-content"></div>
              </div>
            </div>
            <!-- Footer meta -->
            <div class="row mt-5">
              <div class="container">
                <div class="row">
                  <div class="col-12">
                    <div class="pt-5 pb-5 shadow-sm">
                      <div class="container">
                        <div class="row">
                          <div class="col-12">
                            <div class="article-header" id="article-footer-meta"></div>
                            <div class="solid-line"></div>
                            <div class="references-container">
                              <div class="references" id="article-tags-row"></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Not found -->
      <div id="article-not-found" style="display:none" class="article-not-found text-center py-5">
        <p class="display-6 fw-bold text-muted">Article not found</p>
        <p class="text-muted mb-4">This article may have been moved or removed.</p>
        <a href="./news.html" class="btn btn-dark">← Back to News</a>
      </div>

    </div>
    <!-- End of Article Section -->

    <!-- Lightbox -->
    <div id="article-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
      <span id="article-lightbox-close" aria-label="Close">&times;</span>
      <img id="article-lightbox-img" src="" alt="">
    </div>

    <!-- Footer -->
<dpsm-footer></dpsm-footer>
<!-- End of Footer -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/navbar.js"></script>
    <script src="javascript/api-config.js"></script>
    <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug');

      if (!slug) {
        showNotFound();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/articles/${encodeURIComponent(slug)}`);
        if (!res.ok) { showNotFound(); return; }
        const a = await res.json();
        renderArticle(a);
      } catch {
        showNotFound();
      }

      function renderArticle(a) {
        // Update <title>
        document.title = `${a.title} | DPSM`;

        // Hero background
        if (a.image_url) {
          document.getElementById('article-hero').style.backgroundImage = `url('${escUrl(a.image_url)}')`;
        }

        // Title & byline
        document.getElementById('article-title').textContent = a.title || '';
        const date = a.published_at || a.created_at;
        const fmtDate = date ? new Date(date).toLocaleDateString('en-PH', { year:'numeric', month:'long', day:'numeric' }) : '';
        document.getElementById('article-byline').textContent =
          [a.author_name, fmtDate].filter(Boolean).join('  |  ');

        // Rich content (sanitised on server via nh3)
        const richEl = document.getElementById('article-rich-content');
        richEl.innerHTML = a.content || '';
        layoutImages(richEl);

        // Footer meta
        document.getElementById('article-footer-meta').textContent =
          `${a.author_name || 'DPSM'}  |  ${fmtDate}`;

        // Tags
        if (a.tags && a.tags.length) {
          document.getElementById('article-tags-row').innerHTML =
            'Tags: ' + a.tags.map(t => `<span class="badge bg-secondary me-1">${escHtml(t)}</span>`).join('');
        }

        // Show content
        document.getElementById('article-skeleton').style.display = 'none';
        document.getElementById('article-content-wrap').style.display = '';
      }

      function showNotFound() {
        document.getElementById('article-skeleton').style.display = 'none';
        document.getElementById('article-not-found').style.display = '';
      }

      function escHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function escUrl(s) {
        return String(s||'').replace(/'/g,'%27');
      }

      // ── Image grid layout ──────────────────────────────────────────────
      function isImgPara(el) {
        if (!el || el.tagName !== 'P') return false;
        if (el.querySelectorAll('img').length !== 1) return false;
        return el.textContent.trim() === '';
      }

      function layoutImages(container) {
        let children = Array.from(container.children);
        let i = 0;
        while (i < children.length) {
          if (!isImgPara(children[i])) { i++; continue; }
          // Find full run of consecutive image-only paragraphs
          let j = i;
          while (j < children.length && isImgPara(children[j])) j++;
          const run = children.slice(i, j);
          const count = run.length;
          const cols = count === 1 ? 1 : count === 2 ? 2 : 3;

          const grid = document.createElement('div');
          grid.className = `article-img-grid cols-${cols}${count === 1 ? ' single' : ''}`;

          run.forEach(p => {
            const img = p.querySelector('img');
            img.addEventListener('click', () => openLightbox(img.src, img.alt));
            const cell = document.createElement('div');
            cell.appendChild(img);
            grid.appendChild(cell);
          });

          container.insertBefore(grid, run[0]);
          run.forEach(p => container.removeChild(p));

          // Refresh children array after DOM change
          children = Array.from(container.children);
          i = children.indexOf(grid) + 1;
        }
      }

      // ── Lightbox ───────────────────────────────────────────────────────
      const lightbox    = document.getElementById('article-lightbox');
      const lightboxImg = document.getElementById('article-lightbox-img');

      function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt || '';
        lightbox.style.display = 'flex';
        requestAnimationFrame(() => lightbox.classList.add('show'));
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('show');
        setTimeout(() => { lightbox.style.display = 'none'; lightboxImg.src = ''; }, 200);
        document.body.style.overflow = '';
      }

      lightbox.addEventListener('click', closeLightbox);
      lightboxImg.addEventListener('click', e => e.stopPropagation());
      document.getElementById('article-lightbox-close').addEventListener('click', closeLightbox);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    })();
    </script>
  </body>
</html>
