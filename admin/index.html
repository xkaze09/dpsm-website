<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Articles | DPSM Admin</title>
  <link rel="icon" href="/images/dpsmlogo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>

<div id="admin-nav"></div>

<div class="admin-page">
  <div class="container-fluid px-4">

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="fw-bold mb-0"><i class="fas fa-newspaper me-2 text-muted"></i>Articles</h5>
      <a href="/admin/editor.html" class="btn btn-dark btn-sm">
        <i class="fas fa-plus me-1"></i>New article
      </a>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-3" id="stats-row">
      <div class="col-6 col-md-3">
        <div class="admin-card text-center py-3">
          <div class="fs-3 fw-bold" id="stat-total">—</div>
          <div class="text-muted small">Total</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="admin-card text-center py-3">
          <div class="fs-3 fw-bold text-success" id="stat-published">—</div>
          <div class="text-muted small">Published</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="admin-card text-center py-3">
          <div class="fs-3 fw-bold text-secondary" id="stat-draft">—</div>
          <div class="text-muted small">Drafts</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="admin-card text-center py-3">
          <div class="fs-3 fw-bold text-warning" id="stat-archived">—</div>
          <div class="text-muted small">Archived</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="admin-card mb-3 py-2">
      <div class="filters-bar">
        <input type="search" class="form-control form-control-sm" id="search-input" placeholder="Search articles..." style="max-width:260px">
        <select class="form-select form-select-sm" id="status-filter" style="max-width:140px">
          <option value="">All statuses</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary ms-auto" id="refresh-btn">
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="admin-card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">Title</th>
              <th>Status</th>
              <th class="d-none d-md-table-cell">Author</th>
              <th class="d-none d-md-table-cell">Updated</th>
              <th class="d-none d-lg-table-cell">Views</th>
              <th class="pe-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="articles-tbody">
            <tr><td colspan="6" class="text-center py-4 text-muted">
              <div class="spinner-border spinner-border-sm me-2"></div>Loading...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3" id="pagination-row" style="display:none!important">
      <small class="text-muted" id="pagination-info"></small>
      <nav><ul class="pagination pagination-sm mb-0" id="pagination-ul"></ul></nav>
    </div>

  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal fade" id="delete-modal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">Delete article?</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small text-muted">
        This cannot be undone. The article will be permanently removed.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-danger" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/js/config.js"></script>
<script type="module">
  import { requireAuth, api, renderAdminNav, showToast, formatDate, statusBadge } from '/admin/js/admin.js';

  const session = await requireAuth();
  if (!session) throw new Error('Not authenticated');
  await renderAdminNav('articles');

  let allArticles = [];
  let currentPage = 1;
  const PAGE_SIZE = 20;
  let pendingDeleteId = null;

  const tbody = document.getElementById('articles-tbody');
  const searchInput = document.getElementById('search-input');
  const statusFilter = document.getElementById('status-filter');
  const deleteModal = new bootstrap.Modal(document.getElementById('delete-modal'));

  async function loadArticles() {
    try {
      const status = statusFilter.value;
      const q = searchInput.value.trim();
      const params = new URLSearchParams({ page: currentPage, page_size: PAGE_SIZE, include_drafts: true });
      if (status) params.set('status', status);
      if (q) params.set('q', q);

      const data = await api('GET', `/api/articles?${params}`);
      allArticles = data.items || [];

      renderStats(data);
      renderTable(allArticles);
      renderPagination(data);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">
        <i class="fas fa-exclamation-circle me-2"></i>${err.message}
      </td></tr>`;
    }
  }

  function renderStats(data) {
    // Use counts from response if available, else derive from items
    document.getElementById('stat-total').textContent = data.total ?? '—';
    document.getElementById('stat-published').textContent = data.published_count ?? '—';
    document.getElementById('stat-draft').textContent = data.draft_count ?? '—';
    document.getElementById('stat-archived').textContent = data.archived_count ?? '—';
  }

  function renderTable(articles) {
    if (!articles.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">
        <i class="fas fa-inbox fs-2 d-block mb-2"></i>No articles found.
      </td></tr>`;
      return;
    }
    tbody.innerHTML = articles.map(a => `
      <tr class="article-row" data-id="${a.id}">
        <td class="ps-3 article-title-cell">
          <div class="title">${escHtml(a.title)}</div>
          <div class="excerpt">${escHtml(a.excerpt || '')}</div>
        </td>
        <td>${statusBadge(a.status)}</td>
        <td class="d-none d-md-table-cell small">${escHtml(a.author_name || '—')}</td>
        <td class="d-none d-md-table-cell small text-muted">${formatDate(a.updated_at)}</td>
        <td class="d-none d-lg-table-cell small text-muted">${a.view_count ?? 0}</td>
        <td class="pe-3 text-end">
          <div class="btn-group btn-group-sm">
            <a href="/admin/editor.html?id=${a.id}" class="btn btn-outline-secondary" title="Edit">
              <i class="fas fa-edit"></i>
            </a>
            ${a.status === 'draft' ? `
            <button class="btn btn-outline-success publish-btn" data-id="${a.id}" title="Publish">
              <i class="fas fa-check"></i>
            </button>` : ''}
            ${a.status === 'published' ? `
            <button class="btn btn-outline-warning archive-btn" data-id="${a.id}" title="Archive">
              <i class="fas fa-archive"></i>
            </button>` : ''}
            <button class="btn btn-outline-danger delete-btn" data-id="${a.id}" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      </tr>`).join('');

    // Row click → editor
    tbody.querySelectorAll('.article-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.closest('button,a')) return;
        window.location.href = `/admin/editor.html?id=${row.dataset.id}`;
      });
    });

    // Publish buttons
    tbody.querySelectorAll('.publish-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        try {
          await api('POST', `/api/articles/${btn.dataset.id}/publish`);
          showToast('Article published!');
          loadArticles();
        } catch (err) { showToast(err.message, 'danger'); }
      });
    });

    // Archive buttons
    tbody.querySelectorAll('.archive-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        try {
          await api('PATCH', `/api/articles/${btn.dataset.id}`, { status: 'archived' });
          showToast('Article archived.', 'warning');
          loadArticles();
        } catch (err) { showToast(err.message, 'danger'); }
      });
    });

    // Delete buttons
    tbody.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        pendingDeleteId = btn.dataset.id;
        deleteModal.show();
      });
    });
  }

  function renderPagination(data) {
    const paginationRow = document.getElementById('pagination-row');
    const ul = document.getElementById('pagination-ul');
    const info = document.getElementById('pagination-info');
    const total = data.total || 0;
    const pages = Math.ceil(total / PAGE_SIZE);

    if (pages <= 1) { paginationRow.style.display = 'none'; return; }
    paginationRow.style.removeProperty('display');

    const start = (currentPage - 1) * PAGE_SIZE + 1;
    const end = Math.min(currentPage * PAGE_SIZE, total);
    info.textContent = `Showing ${start}–${end} of ${total}`;

    ul.innerHTML = Array.from({ length: pages }, (_, i) => i + 1).map(p => `
      <li class="page-item ${p === currentPage ? 'active' : ''}">
        <button class="page-link" data-page="${p}">${p}</button>
      </li>`).join('');

    ul.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => { currentPage = +btn.dataset.page; loadArticles(); });
    });
  }

  // Delete confirmation
  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    try {
      await api('DELETE', `/api/articles/${pendingDeleteId}`);
      deleteModal.hide();
      showToast('Article deleted.', 'danger');
      loadArticles();
    } catch (err) { showToast(err.message, 'danger'); }
    pendingDeleteId = null;
  });

  // Filters
  let searchTimer;
  searchInput.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage = 1; loadArticles(); }, 350); });
  statusFilter.addEventListener('change', () => { currentPage = 1; loadArticles(); });
  document.getElementById('refresh-btn').addEventListener('click', loadArticles);

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadArticles();
</script>
</body>
</html>
