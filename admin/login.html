<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | DPSM</title>
  <link rel="icon" href="/images/dpsmlogo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="/images/dpsmlogo.png" alt="DPSM Logo" class="login-logo mb-3">
      <h4 class="fw-bold mb-0">DPSM Admin</h4>
      <p class="text-muted small">Division of Physical Sciences and Mathematics</p>
    </div>

    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

    <!-- Normal login form -->
    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label fw-medium">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="you@upv.ph" required autocomplete="email">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100" id="login-btn">
        <i class="fas fa-sign-in-alt me-2"></i>Sign in
      </button>
    </form>

    <!-- Set password form — shown only for invite/recovery links -->
    <form id="set-pw-form" class="d-none" novalidate>
      <p class="text-muted small mb-3">You've been invited to DPSM Admin. Set a password to activate your account.</p>
      <div class="mb-3">
        <label class="form-label fw-medium">New password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="new-pw" placeholder="Minimum 8 characters" minlength="8" required autocomplete="new-password">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Confirm password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="confirm-pw" placeholder="Repeat password" required autocomplete="new-password">
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100" id="set-pw-btn">
        <i class="fas fa-check me-2"></i>Set password &amp; continue
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Access restricted to authorised DPSM staff only.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/js/config.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  const errorEl = document.getElementById('error-alert');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.remove('d-none');
  }

  // Detect invite / recovery link from URL params or hash
  const urlParams = new URLSearchParams(window.location.search);
  const hashParams = new URLSearchParams(window.location.hash.slice(1));
  const authType = urlParams.get('type') || hashParams.get('type');
  const isInvite = authType === 'invite' || authType === 'recovery';

  if (isInvite) {
    // Supabase SDK auto-exchanges the token from the URL on getSession()
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      // Token exchanged — show set-password form
      document.getElementById('login-form').classList.add('d-none');
      document.getElementById('set-pw-form').classList.remove('d-none');
    } else {
      showError('Invite link is invalid or has expired. Ask an admin to send a new invite.');
    }
  } else {
    // Normal flow: redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/admin/index.html';
  }

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.querySelector('#toggle-pw i');
    if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { pw.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
  });

  // Normal sign-in
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorEl.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError(error.message === 'Invalid login credentials' ? 'Incorrect email or password.' : error.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign in';
    } else {
      window.location.href = '/admin/index.html';
    }
  });

  // Set password (invite / recovery flow)
  document.getElementById('set-pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('set-pw-btn');
    const newPw = document.getElementById('new-pw').value;
    const confirmPw = document.getElementById('confirm-pw').value;

    errorEl.classList.add('d-none');
    if (newPw !== confirmPw) { showError('Passwords do not match.'); return; }
    if (newPw.length < 8) { showError('Password must be at least 8 characters.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';

    const { error } = await supabase.auth.updateUser({ password: newPw });
    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check me-2"></i>Set password &amp; continue';
    } else {
      window.location.href = '/admin/index.html';
    }
  });
</script>
</body>
</html>
