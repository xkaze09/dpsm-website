<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | DPSM</title>
  <link rel="icon" href="/images/dpsmlogo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="/images/dpsmlogo.png" alt="DPSM Logo" class="login-logo mb-3">
      <h4 class="fw-bold mb-0">DPSM Admin</h4>
      <p class="text-muted small">Division of Physical Sciences and Mathematics</p>
    </div>

    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label fw-medium">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="you@upv.ph" required autocomplete="email">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100" id="login-btn">
        <i class="fas fa-sign-in-alt me-2"></i>Sign in
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Access restricted to authorised DPSM staff only.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/js/config.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  // Redirect if already logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = '/admin/index.html';

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.querySelector('#toggle-pw i');
    if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { pw.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('error-alert');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorEl.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password.'
        : error.message;
      errorEl.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign in';
    } else {
      window.location.href = '/admin/index.html';
    }
  });
</script>
</body>
</html>
