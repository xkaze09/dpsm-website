<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faculty | DPSM Admin</title>
  <link rel="icon" href="/images/dpsmlogo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/admin/css/admin.css" rel="stylesheet">
  <style>
    .member-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; background:#e9ecef; }
  </style>
</head>
<body>

<div id="admin-nav"></div>

<div class="admin-page">
  <div class="container-fluid px-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="fw-bold mb-0"><i class="fas fa-chalkboard-teacher me-2 text-muted"></i>Faculty & Staff</h5>
      <button class="btn btn-dark btn-sm" id="add-btn">
        <i class="fas fa-plus me-1"></i>Add member
      </button>
    </div>

    <!-- Department filter tabs -->
    <ul class="nav nav-tabs mb-3" id="dept-tabs">
      <li class="nav-item"><button class="nav-link active" data-dept="">All</button></li>
      <li class="nav-item"><button class="nav-link" data-dept="admin">Administrative</button></li>
      <li class="nav-item"><button class="nav-link" data-dept="appmath">Mathematics</button></li>
      <li class="nav-item"><button class="nav-link" data-dept="cs">Computer Science</button></li>
      <li class="nav-item"><button class="nav-link" data-dept="statistics">Statistics</button></li>
      <li class="nav-item"><button class="nav-link" data-dept="physics">Physics</button></li>
    </ul>

    <div class="admin-card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">Name</th>
              <th>Dept</th>
              <th class="d-none d-md-table-cell">Title</th>
              <th class="d-none d-lg-table-cell">Email</th>
              <th class="pe-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="members-tbody">
            <tr><td colspan="5" class="text-center py-4 text-muted">
              <div class="spinner-border spinner-border-sm me-2"></div>Loading...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Add / Edit modal -->
<div class="modal fade" id="member-modal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="modal-title"><i class="fas fa-plus me-2"></i>Add member</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="member-form" novalidate>
        <div class="modal-body">
          <div id="form-error" class="alert alert-danger d-none"></div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-medium">Full name</label>
              <input type="text" class="form-control" id="f-name" required>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">Department</label>
              <select class="form-select" id="f-dept" required>
                <option value="admin">Administrative</option>
                <option value="appmath">Mathematics</option>
                <option value="cs">Computer Science</option>
                <option value="statistics">Statistics</option>
                <option value="physics">Physics</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">Type</label>
              <select class="form-select" id="f-type">
                <option value="faculty">Faculty</option>
                <option value="staff">Staff</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-medium">Title / Rank</label>
              <input type="text" class="form-control" id="f-title" placeholder="e.g. Assistant Professor">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Additional title <span class="text-muted fw-normal">(optional)</span></label>
              <input type="text" class="form-control" id="f-additional-title" placeholder="e.g. Cluster Coordinator">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-medium">Degree</label>
              <input type="text" class="form-control" id="f-degree" placeholder="MS in Mathematics">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">University</label>
              <input type="text" class="form-control" id="f-university" placeholder="University of the Philippines Diliman">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-medium">Email</label>
              <input type="email" class="form-control" id="f-email" placeholder="username@up.edu.ph">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">Sort order</label>
              <input type="number" class="form-control" id="f-sort" value="0" min="0">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">Status</label>
              <select class="form-select" id="f-active">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>

            <!-- Photo -->
            <div class="col-12">
              <label class="form-label fw-medium">Photo</label>
              <div class="d-flex gap-2 align-items-start">
                <div id="photo-preview" class="me-2"></div>
                <div class="flex-grow-1">
                  <label class="btn btn-sm btn-outline-secondary mb-2" for="photo-upload">
                    <i class="fas fa-upload me-1"></i>Upload photo
                  </label>
                  <input type="file" id="photo-upload" accept="image/*" class="d-none">
                  <div class="small text-muted mb-1">Or paste URL:</div>
                  <input type="url" class="form-control form-control-sm" id="f-image-url" placeholder="https://...">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-dark" id="save-btn">
            <i class="fas fa-save me-1"></i>Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/js/config.js"></script>
<script type="module">
  import { requireAuth, api, apiForm, renderAdminNav, showToast, setLoading } from '/admin/js/admin.js';

  const session = await requireAuth('admin');
  if (!session) throw new Error('Not authenticated');
  await renderAdminNav('faculty');

  const tbody = document.getElementById('members-tbody');
  const modal = new bootstrap.Modal(document.getElementById('member-modal'));

  let allMembers = [];
  let activeDept = '';
  let editingId = null;

  const DEPT_LABELS = {
    admin: 'Administrative', appmath: 'Mathematics',
    cs: 'Computer Science', statistics: 'Statistics', physics: 'Physics',
  };

  // ── Department tabs ───────────────────────────────────────────────────────
  document.querySelectorAll('#dept-tabs .nav-link').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#dept-tabs .nav-link').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeDept = btn.dataset.dept;
      renderTable();
    });
  });

  // ── Load members ─────────────────────────────────────────────────────────
  async function loadMembers() {
    try {
      allMembers = await api('GET', '/api/faculty');
      renderTable();
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">${err.message}</td></tr>`;
    }
  }

  function renderTable() {
    const members = activeDept ? allMembers.filter(m => m.department === activeDept) : allMembers;
    if (!members.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">No members found.</td></tr>`;
      return;
    }
    tbody.innerHTML = members.map(m => `
      <tr class="${m.is_active ? '' : 'text-muted'}">
        <td class="ps-3">
          <div class="d-flex align-items-center gap-2">
            ${m.image_url
              ? `<img src="${escHtml(m.image_url)}" class="member-avatar" alt="">`
              : `<div class="member-avatar bg-secondary d-flex align-items-center justify-content-center text-white" style="font-size:.7rem">${initials(m.name)}</div>`}
            <div>
              <div class="fw-medium">${escHtml(m.name)}</div>
              ${!m.is_active ? '<span class="badge bg-secondary">inactive</span>' : ''}
            </div>
          </div>
        </td>
        <td><span class="badge bg-secondary">${escHtml(DEPT_LABELS[m.department] || m.department)}</span>
            <span class="badge bg-light text-dark ms-1">${escHtml(m.type)}</span></td>
        <td class="d-none d-md-table-cell small">${escHtml(m.title || '')}</td>
        <td class="d-none d-lg-table-cell small text-muted">${escHtml(m.email || '')}</td>
        <td class="pe-3 text-end">
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary edit-btn" data-id="${m.id}" title="Edit">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-outline-danger delete-btn" data-id="${m.id}" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      </tr>`).join('');

    tbody.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEdit(btn.dataset.id)));
    tbody.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteMember(btn.dataset.id)));
  }

  // ── Open add modal ────────────────────────────────────────────────────────
  document.getElementById('add-btn').addEventListener('click', () => {
    editingId = null;
    document.getElementById('modal-title').innerHTML = '<i class="fas fa-plus me-2"></i>Add member';
    document.getElementById('member-form').reset();
    if (activeDept) document.getElementById('f-dept').value = activeDept;
    document.getElementById('photo-preview').innerHTML = '';
    document.getElementById('form-error').classList.add('d-none');
    modal.show();
  });

  // ── Open edit modal ───────────────────────────────────────────────────────
  function openEdit(id) {
    const m = allMembers.find(x => x.id === id);
    if (!m) return;
    editingId = id;
    document.getElementById('modal-title').innerHTML = '<i class="fas fa-edit me-2"></i>Edit member';
    document.getElementById('f-name').value = m.name || '';
    document.getElementById('f-dept').value = m.department || 'appmath';
    document.getElementById('f-type').value = m.type || 'faculty';
    document.getElementById('f-title').value = m.title || '';
    document.getElementById('f-additional-title').value = m.additional_title || '';
    document.getElementById('f-degree').value = m.degree || '';
    document.getElementById('f-university').value = m.university || '';
    document.getElementById('f-email').value = m.email || '';
    document.getElementById('f-image-url').value = m.image_url || '';
    document.getElementById('f-sort').value = m.sort_order ?? 0;
    document.getElementById('f-active').value = m.is_active ? 'true' : 'false';
    document.getElementById('photo-preview').innerHTML = m.image_url
      ? `<img src="${escHtml(m.image_url)}" style="width:60px;height:60px;object-fit:cover;border-radius:50%;">`
      : '';
    document.getElementById('form-error').classList.add('d-none');
    modal.show();
  }

  // ── Photo upload ──────────────────────────────────────────────────────────
  document.getElementById('photo-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    try {
      showToast('Uploading photo...', 'info');
      const res = await apiForm('POST', '/api/faculty/upload-photo', fd);
      document.getElementById('f-image-url').value = res.url;
      document.getElementById('photo-preview').innerHTML =
        `<img src="${escHtml(res.url)}" style="width:60px;height:60px;object-fit:cover;border-radius:50%;">`;
      showToast('Photo uploaded!');
    } catch (err) { showToast('Upload failed: ' + err.message, 'danger'); }
  });

  // ── Save ──────────────────────────────────────────────────────────────────
  document.getElementById('member-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    const errEl = document.getElementById('form-error');
    errEl.classList.add('d-none');
    setLoading(btn, true, 'Saving...');

    const payload = {
      department: document.getElementById('f-dept').value,
      type: document.getElementById('f-type').value,
      name: document.getElementById('f-name').value.trim(),
      title: document.getElementById('f-title').value.trim(),
      additional_title: document.getElementById('f-additional-title').value.trim() || null,
      degree: document.getElementById('f-degree').value.trim() || null,
      university: document.getElementById('f-university').value.trim() || null,
      email: document.getElementById('f-email').value.trim() || null,
      image_url: document.getElementById('f-image-url').value.trim() || null,
      sort_order: parseInt(document.getElementById('f-sort').value) || 0,
      is_active: document.getElementById('f-active').value === 'true',
    };

    try {
      if (editingId) {
        await api('PATCH', `/api/faculty/${editingId}`, payload);
        showToast('Member updated.');
      } else {
        await api('POST', '/api/faculty', payload);
        showToast('Member added.');
      }
      modal.hide();
      loadMembers();
    } catch (err) {
      errEl.textContent = err.data?.detail || err.message;
      errEl.classList.remove('d-none');
    }
    setLoading(btn, false, '<i class="fas fa-save me-1"></i>Save');
  });

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteMember(id) {
    if (!confirm('Delete this member? This cannot be undone.')) return;
    try {
      await api('DELETE', `/api/faculty/${id}`);
      showToast('Member deleted.', 'danger');
      loadMembers();
    } catch (err) { showToast(err.message, 'danger'); }
  }

  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadMembers();
</script>
</body>
</html>
