<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LAUNCHING SOON!</title>
    <!-- Favicon -->
    <link rel="icon" href="./images/dpsmlogo.png" type="image/png" />
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/fontawesome.css" />
  </head>
  <body>
        <!-- DPSM Introduction -->
          <div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
            <div class="dpsm-logo pb-md-2">
              <img src="./images/dpsmlogo.png"  width="360px" class="dpsm-logo-about" />
            </div>
            <div class="division-title-container pt-md-5">
              <h1 class="division-title text-uppercase display-1 fw-normal text-center pb-md-2">
                LAUNCHING IN
              </h1>
              <div id="countdown" class="countdown text-primary display-7 pt-md-4">
                <h2 id="timer"></h2>
              </div>
            </div>
            <div class="division-title display-7 fw-normal text-center">
              @ Division of Physical Sciences and Mathematics 2024
            </div>
            <div class="facebook-logo pt-sm-2">

              <a href="https://www.facebook.com/dpsmcas" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" height="2em" viewBox="0 0 512 512">
                  <!--! Font Awesome Free 6.4.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. -->
                <style>
                  svg {
                    fill: #fb8500;
                  }
                </style>
                <path
                  d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z"
                />
              </svg>
            </a>
          </div>
        </div>
        <!-- End of DPSM Introduction -->
    <!-- End of Footer -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Set the countdown target to February 26, 2024, 1:00 PM UTC+8
        var countDownDate = new Date('2024-02-26T13:00:00+08:00').getTime();

        // Update the countdown every 1 second
        var x = setInterval(function() {
          // Get the current time
          var now = new Date().getTime();

          // Calculate the time difference between now and the countdown target
          var distance = countDownDate - now;

          // Time calculations for days, hours, minutes, and seconds
          var days = Math.floor(distance / (1000 * 60 * 60 * 24));
          var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          var seconds = Math.floor((distance % (1000 * 60)) / 1000);

          // Display the result in the element with id="timer"
          document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

          // If the countdown is over, display a message
          if (distance < 0) {
            clearInterval(x);
            document.getElementById("timer").innerHTML = "LAUNCHED!";
          }
        }, 1000);
    </script>
  </body>
</html>
